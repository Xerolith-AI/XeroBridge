plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xerolith.bridge'
    compileSdk 33

    defaultConfig {
        applicationId "com.xerolith.bridge"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
